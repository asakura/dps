[package]
name = "dps"
version = "0.1.0"
edition = "2024"
authors = ["Mikalai Seva"]

[build-dependencies]
anyhow = "1.0.102"
vergen = { version = "9.1.0", features = ["build"] }
vergen-gix = "9.1.0"

[dependencies]
clap = { version = "4.6.1", features = ["derive", "cargo"] }
ratatui = "0.30.0"
crossterm = { version = "0.29.0", features = ["event-stream", "serde"] }
color-eyre = "0.6.5"
directories = "6.0.0"
tracing = "0.1.44"
tracing-error = "0.2.1"
tracing-subscriber = { version = "0.3.23", features = ["env-filter"] }
better-panic = "0.3.0"
strip-ansi-escapes = "0.2.1"
human-panic = "2.0.8"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
config = "0.15.22"
json5 = "1.3.1"
strum = { version = "0.27.2", features = ["derive"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync", "time"] }
tokio-util = "0.7"
futures = "0.3"
signal-hook = "0.4.4"

[dev-dependencies]
approx = "0.5.1"
tempfile = "3"

[profile.release]
codegen-units = 1
lto = true
opt-level = 3
panic = "abort"
strip = "symbols"
