[package]
name = "dps"
version = "0.1.0"
edition = "2024"
authors = ["Mikalai Seva"]

[build-dependencies]
anyhow = "1"
vergen = { version = "9", features = ["build", "cargo"] }
vergen-gix = "9"

[dependencies]
clap = { version = "4", features = ["derive", "cargo"] }
ratatui = "0.30"
crossterm = "0.29"
color-eyre = "0.6"
directories = "6.0"
tracing = "0.1.44"
tracing-error = "0.2.1"
tracing-subscriber = { version = "0.3.23", features = ["env-filter"] }
better-panic = "0.3.0"
strip-ansi-escapes = "0.2.1"
human-panic = "2.0.8"
[dev-dependencies]
approx = "0.5.1"
