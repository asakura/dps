[package]
name = "dps"
version = "0.1.0"
edition = "2024"

[build-dependencies]
vergen = { version = "9", features = ["build"] }
vergen-gix = "9"

[dependencies]
clap = { version = "4", features = ["derive", "cargo"] }
ratatui = "0.29"
crossterm = "0.28"
color-eyre = "0.6"
directories = "5"
tracing = "0.1"
tracing-error = "0.2"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[dev-dependencies]
approx = "0.5.1"
