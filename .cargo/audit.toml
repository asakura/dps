[database]
url   = "https://github.com/RustSec/advisory-db"
fetch = true
stale = false

[output]
# Vulnerabilities are always hard failures (not configurable).
# These additional categories are promoted to errors to match deny.toml policy.
deny      = ["unsound", "unmaintained", "yanked"]
format    = "terminal"
quiet     = false
show_tree = true

[yanked]
enabled      = true
update_index = true

[advisories]
# Add RUSTSEC-XXXX-XXXX entries here when a known advisory cannot be fixed
# immediately. Each entry MUST include an inline comment with the reason and
# an expected resolution date.
#
# Example:
# ignore = [
#     "RUSTSEC-2024-0001",  # upstream patch pending; tracked in issue #42 — revisit 2025-01-01
# ]
ignore = []
