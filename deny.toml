# cargo-deny configuration: https://embarkstudios.github.io/cargo-deny/
#
# Run locally with `nix develop -c cargo deny check` (or plain `cargo deny
# check` if cargo-deny is installed). CI runs this as part of `ci.yml`.

[graph]
all-features = false
no-default-features = false
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
]

# https://embarkstudios.github.io/cargo-deny/checks/advisories/cfg.html
[advisories]
unsound = "all"
unmaintained = "all"
yanked = "warn"
maximum-db-staleness = "P30D"
unused-ignored-advisory = "warn"

# `proc-macro-error2` is unmaintained (RUSTSEC-2026-0173). Pulled in
# transitively via `merge` -> `merge_derive` as a build-time-only proc-macro
# dependency with no runtime impact. Vetted as acceptable until
# `merge_derive` migrates off it.
ignore = ["RUSTSEC-2026-0173"]

# https://embarkstudios.github.io/cargo-deny/checks/licenses/cfg.html
[licenses]
allow = [
    "0BSD",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    # allowed, but no matching crates yet
    # "CC0-1.0",
    # "ISC",
    "MIT",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]
confidence-threshold = 0.8
include-dev = true
unused-allowed-license = "warn"

# `option-ext` (pulled in transitively via `directories` -> `dirs-sys`) is
# MPL-2.0. It is used unmodified, so its weak/file-level copyleft does not
# extend to this workspace's code.
[[licenses.exceptions]]
allow = ["MPL-2.0"]
crate = "option-ext"

# https://embarkstudios.github.io/cargo-deny/checks/bans/cfg.html
[bans]
multiple-versions = "warn"
multiple-versions-include-dev = true
wildcards = "deny"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"

# Vetted duplicate versions: a transitive dependency is still pinned to an
# older major/minor release while the rest of the graph has moved on. Each
# entry skips that older version so `multiple-versions` stays quiet for this
# known pair and would only fire again if a *third* version showed up.

# 0.3.4 is pinned by `ahash` (via `serde-saphyr`); everything else (tempfile,
# uuid, gix-tempfile) is on 0.4.2.
[[bans.skip]]
name = "getrandom"
version = "0.3.4"

# 0.14.5 is pinned by `dashmap` and 0.16.1 by `clru`/`kasuari` (all reached
# via `gix-tempfile`/`gix-pack`/`ratatui-core`); `gix-hashtable` is on the
# newest, 0.17.1.
[[bans.skip]]
name = "hashbrown"
version = "0.14.5"

[[bans.skip]]
name = "hashbrown"
version = "0.16.1"

# 0.3.18 is pinned by `crossterm` (via `ratatui-crossterm`); dps and `gix`
# (via `vergen-gix`) depend directly on 0.4.4.
[[bans.skip]]
name = "signal-hook"
version = "0.3.18"

[bans.build]
include-workspace = false
include-dependencies = true
executables = "warn"
interpreted = "warn"

# CI/test/build-data scripts shipped inside dependency source tarballs.
# Vetted as non-executed by our build; checksums catch upstream changes.
